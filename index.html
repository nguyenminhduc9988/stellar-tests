<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Stellar Tests ✨ Discover Your True Self</title>
  <meta name="description" content="Viral personality tests, horoscopes, and fun quizzes. Click, discover, share!">
  <meta property="og:title" content="Stellar Tests ✨ What's Your True Self?">
  <meta property="og:description" content="Take viral personality tests, horoscopes, and quizzes. Click to discover and share!">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;-webkit-font-smoothing:antialiased;background:#0f0f1a;color:#fff;overflow-x:hidden}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    @keyframes confettiFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
    @keyframes glow{0%,100%{box-shadow:0 0 20px rgba(255,255,255,0.1)}50%{box-shadow:0 0 40px rgba(255,255,255,0.2)}}
    .fade-up{animation:fadeInUp 0.6s cubic-bezier(0.16,1,0.3,1) both}
    .fade{animation:fadeIn 0.5s ease both}
    #app{min-height:100vh}
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="quiz-app.js"></script>
</body>
</html>
